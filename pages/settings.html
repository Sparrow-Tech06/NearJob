<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">         
    <title> NearJob </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/settings.css?v=10.07.26">
    <link rel="stylesheet" href="../css/global.css?v=10.07.26">
    
</head>

<body>

    <header>
        <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
        <i class="bi bi-arrow-left"></i>
        </button>
        <div class="title">  </div>
    </header>

<div class="app-container">

    <section class="profile" id="profileHeader">
        <img src="../splash.png" class="profile-img" id="profileImg" loading="lazy" draggable="false">        
        <div>
            <div class="profile-name"> NearJob </div>
            <div class="profile-version"> Version 2.2 </div>
        </div>
    </section>

    <main class="mb-2">
        <nav class="menu-card">
            <ul id="menuList"></ul>
        </nav>
    </main>

   <!-- <div class="follow-wrap">
        <div class="follow-title"> Follow Us </div>

        <div class="follow-social">
            <a href="https://facebook.com/" class="social-btn"><i class="bi bi-facebook"></i></a>
            <a href="https://instagram.com/" class="social-btn"><i class="bi bi-instagram"></i></a>
            <a href="https://twitter.com/" class="social-btn"><i class="bi bi-twitter-x"></i></a>
       </div>
    </div> -->

</div>

<script>
/* Updated menu data with specific links */
const menuData = [
    { title: "Privacy Policy", icon: "lock", link: "privacy.html", type: "link" },
    { title: "Contact Us", icon: "envelope", link: "mailto:team.kyraapps@outlook.com?subject=App Support Request", type: "mailto" }
];

const menuList = document.getElementById("menuList");

menuData.forEach((item, i) => {
    const li = document.createElement("li");

    // Yahan href="${item.link}" add kiya gaya hai
    li.innerHTML = `
    <a onclick="window.location.href='${item.link}';" class="menu-item">
        <div class="menu-left">
            <div class="icon-circle">
                <i class="bi bi-${item.icon}"></i>
            </div>
            <span>${item.title}</span>
        </div>
        <i class="bi bi-chevron-right arrow"></i>
    </a>
    `;

    menuList.appendChild(li);

    if (i < menuData.length - 1) {
        const divider = document.createElement("div");
        divider.className = "menu-divider";
        menuList.appendChild(divider);
    }
});

</script>

</body>
</html>
