<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">
  
  <title>Excel Math Quiz · Easy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/exclesheet.css?v=11.07.26">
  <link rel="stylesheet" href="../css/global.css?v=11.07.26">
  
</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-3 py-2">
      <!-- Brand -->
      <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>

      <!-- Right Icons -->
      <nav class="d-flex align-items-center gap-2">
         <div class="header-badge"><i class="bi bi-coin"></i> <span id="headerCoins">0</span></div>
     </nav>
</header>
  

<div class="quiz-container" id="quizApp">
  <!-- Excel Sheet Card -->
  <div class="sheet-card" id="sheetCard">
    <div class="sheet-header">
      <div class="sheet-title"><i class="bi bi-file-spreadsheet-fill"></i> MathSheet </div>
      <div class="status-badge" id="statusBadge"><i class="bi bi-grid"></i> 5 questions</div>
    </div>

    <div class="excel-grid" id="excelGrid">
      <!-- header row -->
      <div class="grid-row header-row">
        <div class="grid-cell cell-index">#</div>
        <div class="grid-cell cell-question">Question</div>
        <div class="grid-cell cell-answer">Your Answer</div>
      </div>
      <!-- rows generated by JS -->
    </div>

    <div class="action-bar">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-reset" id="resetBtn" onclick="resetQuiz()"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
        <button class="btn-submit" id="submitBtn" onclick="submitQuiz()" disabled><i class="bi bi-check2-circle"></i> Submit</button>
      </div>
    </div>
    <!-- dynamic message area (kept for extra feedback if needed) -->
    <div id="messageArea"></div>
  </div>

  <!-- Completion / reward card (always shows after submit) -->
  <div class="completion-card" id="completionCard">
    <div class="big-icon" id="resultIcon">🎉</div>
    <h3 id="resultTitle">Perfect!</h3>
    <div class="reward-box" id="rewardBox"><i class="bi bi-coin"></i> +0</div>
    <p id="resultSub">You got 5/5 correct</p>
    <button class="btn-reset" onclick="resetQuiz()" style="margin-top:8px;"><i class="bi bi-arrow-counterclockwise"></i> Try Again</button>
  </div>
</div>

<script>
  (function() {
    // ----- EASY MATH QUESTIONS -----
    const QUESTION_BANK = [
      { q: '2 + 3 = ?', ans: 5 },
      { q: '10 − 4 = ?', ans: 6 },
      { q: '3 × 4 = ?', ans: 12 },
      { q: '12 ÷ 3 = ?', ans: 4 },
      { q: '5 + 6 = ?', ans: 11 },
      { q: '20 − 8 = ?', ans: 12 },
      { q: '7 × 2 = ?', ans: 14 },
      { q: '16 ÷ 4 = ?', ans: 4 },
      { q: '9 + 8 = ?', ans: 17 },
      { q: '15 − 7 = ?', ans: 8 },
      { q: '6 × 5 = ?', ans: 30 },
      { q: '24 ÷ 6 = ?', ans: 4 },
      { q: '11 + 9 = ?', ans: 20 },
      { q: '30 − 12 = ?', ans: 18 },
      { q: '8 × 3 = ?', ans: 24 },
      { q: '42 ÷ 7 = ?', ans: 6 },
      { q: '14 + 7 = ?', ans: 21 },
      { q: '25 − 9 = ?', ans: 16 },
      { q: '4 × 7 = ?', ans: 28 },
      { q: '36 ÷ 6 = ?', ans: 6 }
    ];

    function pickRandomQuestions(count = 5) {
      const shuffled = [...QUESTION_BANK];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, count);
    }

    // ----- STATE -----
    let currentQuestions = pickRandomQuestions(5);
    let userAnswers = currentQuestions.map(() => '');
    let answerStatus = currentQuestions.map(() => null);
    let isSubmitted = false;
    let coins = parseInt(localStorage.getItem('MySalary')) || 0;

    // DOM refs
    const grid = document.getElementById('excelGrid');
    const headerCoins = document.getElementById('headerCoins');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const sheetCard = document.getElementById('sheetCard');
    const completionCard = document.getElementById('completionCard');
    const resultIcon = document.getElementById('resultIcon');
    const resultTitle = document.getElementById('resultTitle');
    const rewardBox = document.getElementById('rewardBox');
    const resultSub = document.getElementById('resultSub');
    const statusBadge = document.getElementById('statusBadge');

    function updateCoins() {
      headerCoins.textContent = coins;
    }

    function androidNotify() {
      if (window.Android && typeof Android.notifyuser === 'function') {
        Android.notifyuser(1);
      }
    }

    function addToHistory(gameName, coinsEarned) {
      try {
        let history = [];
        const stored = localStorage.getItem('gameHistory');
        if (stored) {
          try { history = JSON.parse(stored); if (!Array.isArray(history)) history = []; } catch(e) { history = []; }
        }
        history.push({ game: gameName, coins: coinsEarned, date: new Date().toISOString() });
        if (history.length > 100) history = history.slice(-100);
        localStorage.setItem('gameHistory', JSON.stringify(history));
      } catch(e) {}
    }

    // ----- RENDER GRID -----
    function renderGrid() {
      while (grid.children.length > 1) {
        grid.removeChild(grid.lastChild);
      }

      currentQuestions.forEach((q, idx) => {
        const row = document.createElement('div');
        row.className = 'grid-row';
        row.dataset.index = idx;

        const idxCell = document.createElement('div');
        idxCell.className = 'grid-cell cell-index';
        idxCell.textContent = idx + 1;

        const qCell = document.createElement('div');
        qCell.className = 'grid-cell cell-question';
        qCell.textContent = q.q;

        const ansCell = document.createElement('div');
        ansCell.className = 'grid-cell cell-answer';

        const input = document.createElement('input');
        input.type = 'number';
        input.placeholder = '?';
        input.value = userAnswers[idx] || '';
        input.id = `ans_${idx}`;
        input.autocomplete = 'off';

        if (isSubmitted) {
          input.disabled = true;
          const status = answerStatus[idx];
          if (status === 'correct') input.classList.add('correct');
          else if (status === 'wrong') input.classList.add('wrong');
        } else {
          input.disabled = false;
        }

        input.addEventListener('input', function(e) {
          if (isSubmitted) return;
          userAnswers[idx] = this.value;
          this.classList.remove('correct', 'wrong');
          updateSubmitButton();
        });

        ansCell.appendChild(input);
        row.appendChild(idxCell);
        row.appendChild(qCell);
        row.appendChild(ansCell);
        grid.appendChild(row);
      });

      statusBadge.innerHTML = `<i class="bi bi-grid"></i> ${currentQuestions.length} questions`;
      updateSubmitButton();
    }

    // enable submit only if all fields are filled AND not submitted
    function updateSubmitButton() {
      const filled = userAnswers.filter(v => v !== '' && v !== null && v !== undefined && v.trim() !== '').length;
      const total = currentQuestions.length;
      const allFilled = (filled === total);
      if (!isSubmitted && allFilled) {
        submitBtn.disabled = false;
      } else {
        submitBtn.disabled = true;
      }
    }

    // ----- SUBMIT -----
    function submitQuiz() {
      if (isSubmitted) return;

      // double-check all filled
      const allFilled = userAnswers.every(v => v !== '' && v !== null && v !== undefined && v.trim() !== '');
      if (!allFilled) {
        submitBtn.disabled = true;
        return;
      }

      // evaluate
      let correctCount = 0;
      const inputs = document.querySelectorAll('.grid-row input[type="number"]');
      inputs.forEach((input, idx) => {
        const userVal = parseFloat(userAnswers[idx]);
        const correctVal = currentQuestions[idx].ans;
        const isCorrect = (userVal === correctVal);
        if (isCorrect) {
          correctCount++;
          answerStatus[idx] = 'correct';
          input.classList.add('correct');
        } else {
          answerStatus[idx] = 'wrong';
          input.classList.add('wrong');
        }
        input.disabled = true;
      });

      isSubmitted = true;
      submitBtn.disabled = true;

      const total = currentQuestions.length;
      const half = Math.ceil(total / 2);
      const earned = (correctCount >= half);

      // --- ALWAYS SHOW RESULT POPUP ---
      sheetCard.style.display = 'none';
      completionCard.classList.remove('lose'); // reset
      
      if (earned) {
        coins += 10;
        localStorage.setItem('MySalary', coins);
        updateCoins();
        addToHistory('Excel Math Quiz (Easy)', 10);
        androidNotify();

        resultIcon.textContent = '🌟';
        resultTitle.textContent = 'Well Done!';
        rewardBox.className = 'reward-box';
        rewardBox.innerHTML = `<i class="bi bi-coin"></i> +10`;
        resultSub.textContent = `You got ${correctCount}/${total} correct (≥50%). Coins earned! 🎉`;
        completionCard.style.borderColor = '#4CAF50';
      } else {
        resultIcon.textContent = '😅';
        resultTitle.textContent = 'Keep Trying!';
        rewardBox.className = 'reward-box lose-box';
        rewardBox.innerHTML = `<i class="bi bi-coin"></i> +0`;
        resultSub.textContent = `You got ${correctCount}/${total} correct (need at least ${half}). No coins this time.`;
        completionCard.style.borderColor = '#e57373';
      }
      completionCard.classList.add('show');
    }

    // ----- RESET -----
    function resetQuiz() {
      currentQuestions = pickRandomQuestions(5);
      userAnswers = currentQuestions.map(() => '');
      answerStatus = currentQuestions.map(() => null);
      isSubmitted = false;
      submitBtn.disabled = true;

      sheetCard.style.display = 'block';
      completionCard.classList.remove('show');
      completionCard.classList.remove('lose');

      renderGrid();
      statusBadge.innerHTML = `<i class="bi bi-grid"></i> ${currentQuestions.length} questions`;
      updateSubmitButton();

      const firstInput = document.querySelector('.grid-row input');
      if (firstInput) firstInput.focus();
    }

    // ----- INIT -----
    function init() {
      updateCoins();
      renderGrid();
      completionCard.classList.remove('show');
      sheetCard.style.display = 'block';
      updateSubmitButton();
    }

    window.resetQuiz = resetQuiz;
    window.submitQuiz = submitQuiz;

    init();
  })();
</script>
</body>
</html>
