<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">
  
  <title> Count the Boxes </title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/global.css?v=11.07.26">
  <link rel="stylesheet" href="css/count-box.css?v=11.07.26">
  
</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-3 py-2">
      <!-- Brand -->
      <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>

      <!-- Right Icons -->
      <nav class="d-flex align-items-center gap-2">
         <div class="header-badge"><i class="bi bi-coin"></i> <span id="headerCoins">0</span></div>
     </nav>
</header>

  
<div class="game-wrapper" id="gameApp">
  <div class="count-card" id="gameCard">
    <div class="d-flex justify-content-between align-items-center">
      <span class="round-badge"><i class="bi bi-box-seam me-1"></i> ROUND <span id="roundNum">1</span>/5</span>
      <span style="font-weight:500; color:#6C5CE7;"><i class="bi bi-check-circle-fill me-1"></i><span id="scoreDisplay">0</span></span>
    </div>

    <div class="question-title">
      <i class="bi bi-grid-3x3-gap-fill"></i> Count the boxes
    </div>

    <div class="box-grid" id="boxGrid"></div>

    <div class="options-grid" id="optionsContainer"></div>

    <div class="feedback" id="feedback"><i class="bi"></i> <span id="feedbackText"></span></div>
  </div>

  <div class="completion-card" id="completionCard">
    <div class="big-icon" id="resultIcon">🏆</div>
    <h3 id="resultTitle">Great counting!</h3>
    <div class="reward-box" id="rewardBox"><i class="bi bi-coin"></i> +0</div>
    <p class="sub-message" id="resultSub">You got 0/5 correct</p>
    <button class="btn-retry" onclick="resetGame()">Play again</button>
  </div>
</div>

<script>
  (function() {
    const TOTAL_ROUNDS = 5;
    let rounds = [];
    let currentRound = 0;
    let score = 0;
    let answered = false;
    let gameFinished = false;

    let coins = parseInt(localStorage.getItem('MySalary')) || 0;

    const $ = id => document.getElementById(id);
    const boxGrid = $('boxGrid');
    const optionsContainer = $('optionsContainer');
    const feedback = $('feedback');
    const feedbackText = $('feedbackText');
    const roundNum = $('roundNum');
    const scoreDisplay = $('scoreDisplay');
    const headerCoins = $('headerCoins');
    const gameCard = $('gameCard');
    const completionCard = $('completionCard');
    const resultIcon = $('resultIcon');
    const resultTitle = $('resultTitle');
    const rewardBox = $('rewardBox');
    const resultSub = $('resultSub');

    function updateHeaderCoins() {
      headerCoins.textContent = coins;
    }

    function androidNotify() {
      if (window.Android && typeof Android.notifyuser === 'function') {
        Android.notifyuser(1);
      }
    }

    function addToHistory(gameName, coinsEarned) {
      try {
        let history = [];
        const stored = localStorage.getItem('gameHistory');
        if (stored) {
          try { history = JSON.parse(stored); if (!Array.isArray(history)) history = []; } catch(_) { history = []; }
        }
        history.push({ game: gameName, coins: coinsEarned, date: new Date().toISOString() });
        if (history.length > 100) history = history.slice(-100);
        localStorage.setItem('gameHistory', JSON.stringify(history));
      } catch(_) {}
    }

    function randomCount() {
      return Math.floor(Math.random() * 13) + 3;
    }

    // FIXED: Build options - ALWAYS include the correct answer
    function buildOptions(correct) {
      // Start with correct answer
      let options = [correct];
      
      // Add random unique numbers until we have 4
      let attempts = 0;
      while (options.length < 4 && attempts < 100) {
        attempts++;
        const num = randomCount();
        if (!options.includes(num)) {
          options.push(num);
        }
      }
      
      // Shuffle the options
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }
      
      return options;
    }

    function generateRounds() {
      const newRounds = [];
      for (let i = 0; i < TOTAL_ROUNDS; i++) {
        const count = randomCount();
        const opts = buildOptions(count);
        newRounds.push({ count, options: opts });
      }
      return newRounds;
    }

    function renderRound() {
      if (gameFinished) return;
      const round = rounds[currentRound];
      if (!round) return;

      roundNum.textContent = currentRound + 1;
      scoreDisplay.textContent = score;

      boxGrid.innerHTML = '';
      for (let i = 0; i < round.count; i++) {
        const box = document.createElement('div');
        box.className = 'box-item';
        boxGrid.appendChild(box);
      }

      optionsContainer.innerHTML = '';
      round.options.forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'num-opt';
        btn.textContent = num;
        btn.dataset.value = num;
        btn.onclick = () => handleAnswer(num);
        optionsContainer.appendChild(btn);
      });

      feedback.className = 'feedback';
      feedback.style.display = 'none';
      answered = false;
    }

    function handleAnswer(selected) {
      if (answered || gameFinished) return;
      const round = rounds[currentRound];
      const correct = round.count;
      const isCorrect = (selected === correct);

      const btns = document.querySelectorAll('.num-opt');
      btns.forEach(b => b.classList.add('disabled'));

      btns.forEach(b => {
        const val = parseInt(b.dataset.value, 10);
        if (val === correct) b.classList.add('correct');
        if (val === selected && !isCorrect) b.classList.add('wrong');
      });

      if (isCorrect) score++;

      feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
      const icon = feedback.querySelector('i');
      icon.className = `bi ${isCorrect ? 'bi-check-circle-fill' : 'bi-x-circle-fill'}`;
      feedbackText.textContent = isCorrect ? '✅ Exactly right!' : `❌ Oops! There were ${correct} boxes.`;
      feedback.style.display = 'flex';

      answered = true;

      setTimeout(() => {
        if (currentRound < TOTAL_ROUNDS - 1) {
          currentRound++;
          renderRound();
        } else {
          finishGame();
        }
      }, 1800);
    }

    function finishGame() {
      gameFinished = true;
      gameCard.style.display = 'none';
      completionCard.classList.add('show');

      const passed = score >= 3;
      resultIcon.textContent = passed ? '🎉' : '😌';
      resultTitle.textContent = passed ? 'Count master!' : 'Good effort!';
      const reward = passed ? 10 : 0;
      rewardBox.innerHTML = `<i class="bi bi-coin"></i> +${reward}`;
      resultSub.textContent = `You got ${score}/${TOTAL_ROUNDS} correct ${passed ? '🌟 Keep it up!' : 'Try again for coins!'}`;

      if (passed) {
        coins += 10;
        localStorage.setItem('MySalary', coins);
        updateHeaderCoins();
        addToHistory('Count the Boxes', 10);
        androidNotify();
      }
    }

    function resetGame() {
      rounds = generateRounds();
      currentRound = 0;
      score = 0;
      gameFinished = false;
      answered = false;
      completionCard.classList.remove('show');
      gameCard.style.display = 'block';
      renderRound();
      updateHeaderCoins();
    }

    function initGame() {
      rounds = generateRounds();
      currentRound = 0;
      score = 0;
      gameFinished = false;
      answered = false;
      updateHeaderCoins();
      renderRound();
    }

    window.resetGame = resetGame;
    initGame();
  })();
</script>

</body>
</html>
