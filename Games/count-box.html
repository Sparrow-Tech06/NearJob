<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">
  
  <title>Count the Boxes</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/global.css?v=11.07.26">
  <link rel="stylesheet" href="css/count-box.css?v=11.07.26">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }
    body {
      background: #f4f6fc;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    .header {
      background: #ffffffdd;
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #e9ecf5;
      padding: 10px 20px;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 26px;
      line-height: 1;
      color: #2d2b4e;
      transition: 0.2s;
      padding: 0 6px;
    }
    .back-btn:hover { color: #6C5CE7; }
    .header-badge {
      background: #f0edff;
      padding: 6px 16px 6px 14px;
      border-radius: 40px;
      font-weight: 600;
      color: #2d2b4e;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
    }
    .header-badge i { color: #f5b342; font-size: 20px; }

    .game-wrapper {
      max-width: 700px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .count-card {
      background: #ffffff;
      border-radius: 32px;
      padding: 28px 24px 30px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
      border: 1px solid #eef1f9;
    }
    .round-badge {
      background: #eae7fd;
      color: #4f3eb5;
      font-weight: 600;
      padding: 4px 18px;
      border-radius: 60px;
      font-size: 14px;
      letter-spacing: 0.3px;
    }
    .question-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin: 10px 0 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .question-title i {
      color: #6C5CE7;
      font-size: 28px;
    }

    .box-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px 18px;
      background: #fafbff;
      padding: 30px 20px;
      border-radius: 28px;
      border: 1px dashed #d2d9ed;
      margin: 12px 0 20px 0;
      min-height: 140px;
    }
    .box-item {
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #6C5CE7, #5a4bd1);
      border-radius: 18px;
      box-shadow: 0 8px 0 #3f31a3, 0 10px 18px rgba(90, 70, 200, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 20px;
    }
    .box-item:nth-child(3n) { background: linear-gradient(145deg, #f39c12, #e08e0b); box-shadow: 0 8px 0 #b36d0a, 0 10px 18px rgba(230, 150, 20, 0.3); }
    .box-item:nth-child(5n+2) { background: linear-gradient(145deg, #2ecc71, #27ae60); box-shadow: 0 8px 0 #1e8449, 0 10px 18px rgba(40, 200, 100, 0.25); }
    .box-item:nth-child(7n+4) { background: linear-gradient(145deg, #e74c3c, #c0392b); box-shadow: 0 8px 0 #922b21, 0 10px 18px rgba(220, 70, 50, 0.25); }

    .options-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 12px 0 10px;
    }
    .num-opt {
      min-width: 64px;
      padding: 14px 8px;
      border: 2px solid #dce2f0;
      background: white;
      border-radius: 60px;
      font-weight: 700;
      font-size: 20px;
      color: #1a1a2e;
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      flex: 0 1 auto;
      text-align: center;
      cursor: pointer;
    }
    .num-opt:hover:not(.disabled) {
      background: #f0edff;
      border-color: #9b8ce6;
      transform: scale(1.02);
    }
    .num-opt.correct {
      background: #d4edda;
      border-color: #28a745;
      color: #155724;
    }
    .num-opt.wrong {
      background: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }
    .num-opt.disabled {
      opacity: 0.7;
      cursor: default;
    }
    .num-opt.disabled:hover { transform: none; background: white; }

    .feedback {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 40px;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 12px;
      font-size: 18px;
    }
    .feedback.show { display: flex; }
    .feedback.correct { background: #d4edda; color: #155724; border: 1px solid #b7dfb9; }
    .feedback.wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .feedback i { font-size: 26px; }

    .completion-card {
      background: white;
      border-radius: 36px;
      padding: 36px 24px 30px;
      text-align: center;
      border: 2px solid #6C5CE7;
      box-shadow: 0 16px 50px rgba(90, 70, 200, 0.10);
      display: none;
      margin-top: 8px;
    }
    .completion-card.show { display: block; animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes popIn {
      0% { transform: scale(0.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .completion-card .big-icon { font-size: 68px; margin-bottom: 6px; }
    .completion-card h3 { font-weight: 700; color: #1a1a2e; margin: 8px 0; }
    .reward-box {
      background: #e8f5e9;
      padding: 10px 30px;
      border-radius: 60px;
      display: inline-block;
      font-size: 28px;
      font-weight: 700;
      color: #2e7d32;
      margin: 10px 0 6px;
    }
    .reward-box i { margin-right: 8px; color: #f5b342; }
    .btn-retry {
      margin-top: 18px;
      padding: 12px 38px;
      border: 2px solid #6C5CE7;
      border-radius: 60px;
      background: transparent;
      color: #6C5CE7;
      font-weight: 700;
      transition: 0.25s;
      font-size: 18px;
      cursor: pointer;
    }
    .btn-retry:hover {
      background: #6C5CE7;
      color: white;
    }
    .sub-message { font-size: 18px; color: #444; margin-top: 6px; }
  </style>
</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-3 py-2">
      <!-- Brand -->
      <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>

      <!-- Right Icons -->
      <nav class="d-flex align-items-center gap-2">
         <div class="header-badge"><i class="bi bi-coin"></i> <span id="headerCoins">0</span></div>
     </nav>
</header>

<div class="game-wrapper" id="gameApp">
  <div class="count-card" id="gameCard">
    <div class="d-flex justify-content-between align-items-center">
      <span class="round-badge"><i class="bi bi-box-seam me-1"></i> ROUND <span id="roundNum">1</span>/5</span>
      <span style="font-weight:500; color:#6C5CE7;"><i class="bi bi-check-circle-fill me-1"></i><span id="scoreDisplay">0</span></span>
    </div>

    <div class="question-title">
      <i class="bi bi-grid-3x3-gap-fill"></i> Count the boxes
    </div>

    <div class="box-grid" id="boxGrid"></div>

    <div class="options-grid" id="optionsContainer"></div>

    <div class="feedback" id="feedback"><i class="bi"></i> <span id="feedbackText"></span></div>
  </div>

  <div class="completion-card" id="completionCard">
    <div class="big-icon" id="resultIcon">🏆</div>
    <h3 id="resultTitle">Great counting!</h3>
    <div class="reward-box" id="rewardBox"><i class="bi bi-coin"></i> +0</div>
    <p class="sub-message" id="resultSub">You got 0/5 correct</p>
    <button class="btn-retry" onclick="resetGame()">Play again</button>
  </div>
</div>

<script>
  (function() {
    const TOTAL_ROUNDS = 5;
    let rounds = [];
    let currentRound = 0;
    let score = 0;
    let answered = false;
    let gameFinished = false;

    let coins = parseInt(localStorage.getItem('MySalary')) || 0;

    const $ = id => document.getElementById(id);
    const boxGrid = $('boxGrid');
    const optionsContainer = $('optionsContainer');
    const feedback = $('feedback');
    const feedbackText = $('feedbackText');
    const roundNum = $('roundNum');
    const scoreDisplay = $('scoreDisplay');
    const headerCoins = $('headerCoins');
    const gameCard = $('gameCard');
    const completionCard = $('completionCard');
    const resultIcon = $('resultIcon');
    const resultTitle = $('resultTitle');
    const rewardBox = $('rewardBox');
    const resultSub = $('resultSub');

    function updateHeaderCoins() {
      headerCoins.textContent = coins;
    }

    function androidNotify() {
      if (window.Android && typeof Android.notifyuser === 'function') {
        Android.notifyuser(1);
      }
    }

    function addToHistory(gameName, coinsEarned) {
      try {
        let history = [];
        const stored = localStorage.getItem('gameHistory');
        if (stored) {
          try { history = JSON.parse(stored); if (!Array.isArray(history)) history = []; } catch(_) { history = []; }
        }
        history.push({ game: gameName, coins: coinsEarned, date: new Date().toISOString() });
        if (history.length > 100) history = history.slice(-100);
        localStorage.setItem('gameHistory', JSON.stringify(history));
      } catch(_) {}
    }

    function randomCount() {
      return Math.floor(Math.random() * 13) + 3;
    }

    // FIXED: Build options - ALWAYS include the correct answer
    function buildOptions(correct) {
      // Start with correct answer
      let options = [correct];
      
      // Add random unique numbers until we have 4
      let attempts = 0;
      while (options.length < 4 && attempts < 100) {
        attempts++;
        const num = randomCount();
        if (!options.includes(num)) {
          options.push(num);
        }
      }
      
      // Shuffle the options
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }
      
      return options;
    }

    function generateRounds() {
      const newRounds = [];
      for (let i = 0; i < TOTAL_ROUNDS; i++) {
        const count = randomCount();
        const opts = buildOptions(count);
        newRounds.push({ count, options: opts });
      }
      return newRounds;
    }

    function renderRound() {
      if (gameFinished) return;
      const round = rounds[currentRound];
      if (!round) return;

      roundNum.textContent = currentRound + 1;
      scoreDisplay.textContent = score;

      boxGrid.innerHTML = '';
      for (let i = 0; i < round.count; i++) {
        const box = document.createElement('div');
        box.className = 'box-item';
        boxGrid.appendChild(box);
      }

      optionsContainer.innerHTML = '';
      round.options.forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'num-opt';
        btn.textContent = num;
        btn.dataset.value = num;
        btn.onclick = () => handleAnswer(num);
        optionsContainer.appendChild(btn);
      });

      feedback.className = 'feedback';
      feedback.style.display = 'none';
      answered = false;
    }

    function handleAnswer(selected) {
      if (answered || gameFinished) return;
      const round = rounds[currentRound];
      const correct = round.count;
      const isCorrect = (selected === correct);

      const btns = document.querySelectorAll('.num-opt');
      btns.forEach(b => b.classList.add('disabled'));

      btns.forEach(b => {
        const val = parseInt(b.dataset.value, 10);
        if (val === correct) b.classList.add('correct');
        if (val === selected && !isCorrect) b.classList.add('wrong');
      });

      if (isCorrect) score++;

      feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
      const icon = feedback.querySelector('i');
      icon.className = `bi ${isCorrect ? 'bi-check-circle-fill' : 'bi-x-circle-fill'}`;
      feedbackText.textContent = isCorrect ? '✅ Exactly right!' : `❌ Oops! There were ${correct} boxes.`;
      feedback.style.display = 'flex';

      answered = true;

      setTimeout(() => {
        if (currentRound < TOTAL_ROUNDS - 1) {
          currentRound++;
          renderRound();
        } else {
          finishGame();
        }
      }, 1800);
    }

    function finishGame() {
      gameFinished = true;
      gameCard.style.display = 'none';
      completionCard.classList.add('show');

      const passed = score >= 3;
      resultIcon.textContent = passed ? '🎉' : '😌';
      resultTitle.textContent = passed ? 'Count master!' : 'Good effort!';
      const reward = passed ? 10 : 0;
      rewardBox.innerHTML = `<i class="bi bi-coin"></i> +${reward}`;
      resultSub.textContent = `You got ${score}/${TOTAL_ROUNDS} correct ${passed ? '🌟 Keep it up!' : 'Try again for coins!'}`;

      if (passed) {
        coins += 10;
        localStorage.setItem('MySalary', coins);
        updateHeaderCoins();
        addToHistory('Count the Boxes', 10);
        androidNotify();
      }
    }

    function resetGame() {
      rounds = generateRounds();
      currentRound = 0;
      score = 0;
      gameFinished = false;
      answered = false;
      completionCard.classList.remove('show');
      gameCard.style.display = 'block';
      renderRound();
      updateHeaderCoins();
    }

    function initGame() {
      rounds = generateRounds();
      currentRound = 0;
      score = 0;
      gameFinished = false;
      answered = false;
      updateHeaderCoins();
      renderRound();
    }

    window.resetGame = resetGame;
    initGame();
  })();
</script>

</body>
</html>
