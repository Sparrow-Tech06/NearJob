<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/global.css?v10.07.26">

<style>
body{
    background:#f5f6fa;
    font-family:Arial,Helvetica,sans-serif;
}

.container-box{
    max-width:700px;
    margin:18px auto;
    padding:0 14px;
}

.page-title{
    font-size:20px;
    font-weight:700;
}

.header-badge{
    display:flex;
    align-items:center;
    gap:6px;
    background:#fff7df;
    color:#d68910;
    border:1px solid #f5d76e;
    padding:6px 12px;
    border-radius:50px;
    font-weight:700;
}

.history-card{
    background:#fff;
    border:1px solid #ececec;
    border-radius:18px;
    padding:15px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.left{
    display:flex;
    flex-direction:column;
}

.game-name{
    font-size:15px;
    font-weight:600;
    color:#222;
}

.history-date{
    font-size:12px;
    color:#8a8a8a;
    margin-top:3px;
}

.coin{
    color:#28a745;
    font-size:16px;
    font-weight:700;
}

.empty-box{
    background:#fff;
    border:1px solid #ececec;
    border-radius:18px;
    padding:50px 20px;
    text-align:center;
    color:#888;
}
</style>

</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-3 py-2">

    <button class="back-btn" onclick="history.back()">
        <i class="bi bi-arrow-left"></i>
    </button>

    <div class="page-title">
        Coin History
    </div>

    <div class="header-badge">
        <i class="bi bi-coin"></i>
        <span id="totalCoins">0</span>
    </div>

</header>

<div class="container-box">

    <div id="historyList"></div>

</div>

<script>

function loadTotalCoins(){
    const total=parseInt(localStorage.getItem("MySalary")) || 0;
    document.getElementById("totalCoins").textContent=total;
}

function loadHistory(){

    let history=[];

    try{
        history=JSON.parse(localStorage.getItem("gameHistory")) || [];
    }catch(e){
        history=[];
    }

    // Sirf winning history
    history=history.filter(item=>item.coins>0);

    // Latest first
    history.reverse();

    const historyList=document.getElementById("historyList");

    if(history.length===0){
        historyList.innerHTML=`
            <div class="empty-box">
                No coin history found.
            </div>
        `;
        return;
    }

    historyList.innerHTML="";

    history.forEach(item=>{

        const date=new Date(item.date).toLocaleDateString("en-GB",{
            day:"2-digit",
            month:"short",
            year:"numeric"
        });

        historyList.innerHTML+=`
            <div class="history-card">

                <div class="left">
                    <div class="game-name">${item.game}</div>
                    <div class="history-date">${date}</div>
                </div>

                <div class="coin">
                    +${item.coins} Coins
                </div>

            </div>
        `;

    });

}

loadTotalCoins();
loadHistory();

</script>

</body>
</html>
