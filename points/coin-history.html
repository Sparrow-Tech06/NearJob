<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/global.css?v10.07.26">

<style>
    
.container-box{
    max-width:700px;
    margin:18px auto;
    padding:0 14px;
}

.history-card{
    background:#fff;
    border-radius:18px;
    border:1px solid #e8e8e8;
    padding:16px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.game-name{
    font-size:15px;
    font-weight:600;
    color:#222;
}

.coin{
    color:#28a745;
    font-weight:700;
    font-size:16px;
}

.empty-box{
    background:#fff;
    border-radius:18px;
    border:1px solid #e8e8e8;
    padding:40px 20px;
    text-align:center;
    color:#777;
}

.page-title{
    font-size:20px;
    font-weight:700;
}
</style>

</head>
<body>

<header class="header d-flex justify-content-between align-items-center px-3 py-2">

    <div>
       <!-- Back -->
       <button class="back-btn" onclick="history.back()"> <i class="bi bi-arrow-left"></i></button>
       <!-- Title -->
       <div class="page-title fw-bold"> Coin History </div>
  </div>
    
    <!-- Total Coins -->
    <div class="header-badge">
        <i class="bi bi-coin"></i>
        <span id="totalCoins">0</span>
    </div>

</header>


<div class="container-box">

    <div id="historyList"></div>

</div>

<script>

function loadTotalCoins() {
    const total = parseInt(localStorage.getItem("MySalary")) || 0;
    document.getElementById("totalCoins").textContent = total;
}

loadTotalCoins();


const historyList=document.getElementById("historyList");

function loadHistory(){

    let history=[];

    try{
        history=JSON.parse(localStorage.getItem("gameHistory")) || [];
    }catch(e){
        history=[];
    }

    // Sirf winning entries
    history=history.filter(item=>item.coins>0);

    // Latest first
    history.reverse();

    if(history.length===0){
        historyList.innerHTML=`
            <div class="empty-box">
                No coin history found.
            </div>
        `;
        return;
    }

    historyList.innerHTML="";

    history.forEach(item=>{

        historyList.innerHTML+=`
            <div class="history-card">
                <div class="game-name">${item.game}</div>
                <div class="coin">+${item.coins} Coins</div>
            </div>
        `;

    });

}

loadHistory();

</script>

</body>
</html>
