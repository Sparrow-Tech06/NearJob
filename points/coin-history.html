<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>History</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{background:#f0f2f8;font-family:'Segoe UI',sans-serif;padding-bottom:40px}

/* Header */
.header{background:#fff;padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #e6eaf0;position:sticky;top:0;z-index:100}
.back-btn{width:46px;height:46px;border:none;border-radius:14px;background:linear-gradient(135deg,#6C5CE7,#a29bfe);color:#fff;font-size:20px;transition:.2s}
.back-btn:hover{transform:scale(1.05)}
.page-title{font-size:22px;font-weight:700;color:#1a1a2e}
.header-badge{margin-left:auto;background:#6C5CE7;color:#fff;padding:4px 14px;border-radius:40px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}

/* History List */
.history-container{margin:0 16px}
.history-title{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.history-list{display:flex;flex-direction:column;gap:10px}

.history-item{background:#fff;border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;border:1px solid #edeef3;transition:.2s;animation:slideIn .3s ease}
.history-item:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.04)}
@keyframes slideIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}

.history-item .icon-box{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.history-item .icon-box.green{background:#e8f5e9;color:#4CAF50}
.history-item .icon-box.purple{background:#f0edff;color:#6C5CE7}
.history-item .icon-box.orange{background:#fff3e0;color:#FF9800}
.history-item .icon-box.red{background:#fde8e8;color:#e74c3c}

.history-item .details{flex:1}
.history-item .details .game-name{font-weight:600;color:#1a1a2e;font-size:15px}
.history-item .details .timestamp{font-size:12px;color:#999;display:flex;align-items:center;gap:4px;margin-top:2px}
.history-item .details .timestamp i{font-size:11px}

.history-item .coin-amount{font-weight:700;font-size:18px;display:flex;align-items:center;gap:4px}
.history-item .coin-amount.positive{color:#4CAF50}
.history-item .coin-amount.negative{color:#e74c3c}

.empty-state{text-align:center;padding:50px 20px;background:#fff;border-radius:20px;border:2px dashed #e6eaf0}
.empty-state .big-icon{font-size:56px;display:block;margin-bottom:12px}
.empty-state h5{color:#1a1a2e;font-weight:600}
.empty-state p{color:#999;font-size:14px}

@media(max-width:480px){
    .history-item{padding:12px 14px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
    <div class="page-title">📜 History</div>
    <div class="header-badge"><i class="bi bi-coin"></i> <span id="headerCoins">0</span></div>
</div>

<!-- History -->
<div class="history-container">
    <div class="history-title">
        <i class="bi bi-clock-history" style="color:#6C5CE7"></i> Game History
    </div>
    <div class="history-list" id="historyList"></div>
</div>

<script>
function getHistory(){try{return JSON.parse(localStorage.getItem('gameHistory'))||[]}catch{return[]}}
function getCoins(){return parseInt(localStorage.getItem('MySalary'))||0}
function updateCoinsDisplay(){document.getElementById('headerCoins').textContent=getCoins()}
function addGameEntry(gameName,coinsEarned,won){const h=getHistory();h.push({game:gameName,coins:coinsEarned,won:won,date:new Date().toISOString()});if(h.length>50)h.shift();localStorage.setItem('gameHistory',JSON.stringify(h))}
function renderHistory(){const h=getHistory(),list=document.getElementById('historyList');if(h.length===0){list.innerHTML=`<div class="empty-state"><span class="big-icon">🎯</span><h5>No History Yet</h5><p>Play some games to see your history here!</p></div>`;return}
list.innerHTML=h.slice().reverse().map((e,i)=>{const d=new Date(e.date);return`<div class="history-item" style="animation-delay:${i*50}ms"><div class="icon-box ${e.won?'green':'red'}">${e.won?'🏆':'😅'}</div><div class="details"><div class="game-name">${getGameIcon(e.game)} ${e.game}</div><div class="timestamp"><i class="bi bi-calendar3"></i> ${d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} • ${d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div></div><div class="coin-amount ${e.coins>0?'positive':'negative'}">${e.coins>0?'+':''}${e.coins} <i class="bi bi-coin"></i></div></div>`}).join('')}
function getGameIcon(n){const icons={'Find the File':'📂','Rewards':'🎁','Quiz':'📝','Memory':'🧠','Trivia':'❓'};for(let[k,v]of Object.entries(icons))if(n.includes(k))return v;return'🎮'}
window.addGameEntry=addGameEntry;updateCoinsDisplay();renderHistory();setInterval(updateCoinsDisplay,2000);
</script>

</body>
</html>
