<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>History</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{background:#f0f2f8;font-family:'Segoe UI',sans-serif;padding-bottom:40px}

/* Header */
.header{background:#fff;padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #e6eaf0;position:sticky;top:0;z-index:100}
.back-btn{width:46px;height:46px;border:none;border-radius:14px;background:linear-gradient(135deg,#6C5CE7,#a29bfe);color:#fff;font-size:20px;transition:.2s}
.back-btn:hover{transform:scale(1.05)}
.page-title{font-size:22px;font-weight:700;color:#1a1a2e}
.header-badge{margin-left:auto;background:#6C5CE7;color:#fff;padding:4px 14px;border-radius:40px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}

/* Stats Cards */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 20px}
.stat-card{background:#fff;border-radius:18px;padding:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.04);border:1px solid #edeef3}
.stat-card .number{font-size:28px;font-weight:700;color:#1a1a2e}
.stat-card .label{font-size:13px;color:#888;margin-top:2px}
.stat-card .icon{font-size:24px;display:block;margin-bottom:4px}
.stat-card.green .number{color:#4CAF50}
.stat-card.purple .number{color:#6C5CE7}
.stat-card.orange .number{color:#FF9800}

/* History List */
.history-container{margin:0 16px}
.history-title{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.history-list{display:flex;flex-direction:column;gap:10px}

.history-item{background:#fff;border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;border:1px solid #edeef3;transition:.2s;animation:slideIn .3s ease}
.history-item:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.04)}
@keyframes slideIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}

.history-item .icon-box{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.history-item .icon-box.green{background:#e8f5e9;color:#4CAF50}
.history-item .icon-box.purple{background:#f0edff;color:#6C5CE7}
.history-item .icon-box.orange{background:#fff3e0;color:#FF9800}
.history-item .icon-box.red{background:#fde8e8;color:#e74c3c}

.history-item .details{flex:1}
.history-item .details .game-name{font-weight:600;color:#1a1a2e;font-size:15px}
.history-item .details .timestamp{font-size:12px;color:#999;display:flex;align-items:center;gap:4px;margin-top:2px}
.history-item .details .timestamp i{font-size:11px}

.history-item .coin-amount{font-weight:700;font-size:18px;display:flex;align-items:center;gap:4px}
.history-item .coin-amount.positive{color:#4CAF50}
.history-item .coin-amount.negative{color:#e74c3c}

.empty-state{text-align:center;padding:50px 20px;background:#fff;border-radius:20px;border:2px dashed #e6eaf0}
.empty-state .big-icon{font-size:56px;display:block;margin-bottom:12px}
.empty-state h5{color:#1a1a2e;font-weight:600}
.empty-state p{color:#999;font-size:14px}

/* Clear Button */
.clear-btn{padding:8px 20px;border:2px solid #e74c3c;border-radius:12px;background:transparent;color:#e74c3c;font-weight:600;font-size:13px;transition:.3s;margin-left:auto}
.clear-btn:hover{background:#e74c3c;color:#fff}

@media(max-width:480px){
    .stats-row{grid-template-columns:repeat(2,1fr);margin:12px 14px}
    .stat-card .number{font-size:22px}
    .history-item{padding:12px 14px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
    <div class="page-title">📜 History</div>
    <div class="header-badge"><i class="bi bi-coin"></i> <span id="headerCoins">0</span></div>
</div>

<!-- Stats -->
<div class="stats-row" id="statsRow">
    <div class="stat-card purple">
        <span class="icon">🎮</span>
        <div class="number" id="totalGames">0</div>
        <div class="label">Total Games</div>
    </div>
    <div class="stat-card green">
        <span class="icon">🏆</span>
        <div class="number" id="gamesWon">0</div>
        <div class="label">Games Won</div>
    </div>
    <div class="stat-card orange">
        <span class="icon">🪙</span>
        <div class="number" id="totalCoinsEarned">0</div>
        <div class="label">Coins Earned</div>
    </div>
</div>

<!-- History -->
<div class="history-container">
    <div class="history-title">
        <i class="bi bi-clock-history" style="color:#6C5CE7"></i> Game History
        <button class="clear-btn" onclick="clearHistory()"><i class="bi bi-trash3"></i> Clear</button>
    </div>
    <div class="history-list" id="historyList"></div>
</div>

<script>
// ============================================================
//  DATA STRUCTURE
// ============================================================

// History stored in localStorage as: 
// Key: "gameHistory" 
// Value: JSON array of { game: string, coins: number, won: boolean, date: string }

// ============================================================
//  HELPERS
// ============================================================

function getHistory() {
    try {
        return JSON.parse(localStorage.getItem('gameHistory')) || [];
    } catch {
        return [];
    }
}

function saveHistory(history) {
    localStorage.setItem('gameHistory', JSON.stringify(history));
}

function getCoins() {
    return parseInt(localStorage.getItem('MySalary')) || 0;
}

function updateCoinsDisplay() {
    document.getElementById('headerCoins').textContent = getCoins();
}

// ============================================================
//  ADD GAME ENTRY (called from other pages)
// ============================================================

function addGameEntry(gameName, coinsEarned, won) {
    const history = getHistory();
    history.push({
        game: gameName,
        coins: coinsEarned,
        won: won,
        date: new Date().toISOString()
    });
    // Keep last 50 entries
    if (history.length > 50) history.shift();
    saveHistory(history);
}

// ============================================================
//  RENDER HISTORY
// ============================================================

function renderHistory() {
    const history = getHistory();
    const list = document.getElementById('historyList');
    
    // Stats
    const totalGames = history.length;
    const gamesWon = history.filter(h => h.won).length;
    const totalCoins = history.reduce((sum, h) => sum + (h.coins > 0 ? h.coins : 0), 0);
    
    document.getElementById('totalGames').textContent = totalGames;
    document.getElementById('gamesWon').textContent = gamesWon;
    document.getElementById('totalCoinsEarned').textContent = totalCoins;
    
    // Empty state
    if (totalGames === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <span class="big-icon">🎯</span>
                <h5>No History Yet</h5>
                <p>Play some games to see your history here!</p>
            </div>
        `;
        return;
    }
    
    // Render entries (newest first)
    list.innerHTML = history.slice().reverse().map((entry, index) => {
        const date = new Date(entry.date);
        const formattedDate = date.toLocaleDateString('en-IN', { 
            day: '2-digit', 
            month: 'short', 
            year: 'numeric' 
        });
        const formattedTime = date.toLocaleTimeString('en-IN', { 
            hour: '2-digit', 
            minute: '2-digit' 
        });
        
        const iconBoxClass = entry.won ? 'green' : 'red';
        const iconEmoji = entry.won ? '🏆' : '😅';
        const coinClass = entry.coins > 0 ? 'positive' : 'negative';
        const coinSign = entry.coins > 0 ? '+' : '';
        const gameIcon = getGameIcon(entry.game);
        
        // Animation delay
        const delay = index * 50;
        
        return `
            <div class="history-item" style="animation-delay:${delay}ms">
                <div class="icon-box ${iconBoxClass}">${iconEmoji}</div>
                <div class="details">
                    <div class="game-name">${gameIcon} ${entry.game}</div>
                    <div class="timestamp">
                        <i class="bi bi-calendar3"></i> ${formattedDate} • ${formattedTime}
                    </div>
                </div>
                <div class="coin-amount ${coinClass}">
                    ${coinSign}${entry.coins} <i class="bi bi-coin"></i>
                </div>
            </div>
        `;
    }).join('');
}

function getGameIcon(gameName) {
    const icons = {
        'Find the File': '📂',
        'Rewards': '🎁',
        'Quiz': '📝',
        'Memory': '🧠',
        'Trivia': '❓'
    };
    for (const [key, icon] of Object.entries(icons)) {
        if (gameName.includes(key)) return icon;
    }
    return '🎮';
}

// ============================================================
//  CLEAR HISTORY
// ============================================================

function clearHistory() {
    if (confirm('Are you sure you want to clear all history?')) {
        saveHistory([]);
        renderHistory();
        updateCoinsDisplay();
    }
}

// ============================================================
//  EXPOSE TO GLOBAL (for other pages to call)
// ============================================================

window.addGameEntry = addGameEntry;

// ============================================================
//  INIT
// ============================================================

updateCoinsDisplay();
renderHistory();

// Auto-refresh coins every 2 seconds (if updated from other tab)
setInterval(() => {
    updateCoinsDisplay();
}, 2000);

console.log('📜 History page loaded!');
console.log('💡 Call addGameEntry("Game Name", coins, won) to add entry');
</script>

</body>
</html>
