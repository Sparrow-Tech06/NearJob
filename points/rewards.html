<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rewards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f8f8f8;
    font-family:'Segoe UI',sans-serif;
    padding-bottom:30px;
}

/* Header */

.header{
    background:#fff;
    padding:18px 16px;
    display:flex;
    align-items:center;
    gap:15px;
    border-bottom:1px solid #eee;
}

.back-btn{
    width:52px;
    height:52px;
    border:none;
    border-radius:14px;
    background:#6C5CE7;
    color:#fff;
    font-size:22px;
}

.page-title{
    font-size:28px;
    font-weight:600;
    color:#222;
}

/* Balance Card */

.balance-card{
    margin:16px;
    height:145px;
    border-radius:24px;
    background:linear-gradient(135deg,#6C5CE7,#7158FF);
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    color:#fff;
}

.balance-card .coin{
    font-size:42px;
}

.balance-card .amount{
    font-size:52px;
    font-weight:700;
}

/* Reward Card */

.reward-card{
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.reward-card.unlocked{
    border:3px solid #4CAF50;
}

.reward-card.locked{
    border:1px solid #e6e6e6;
}

.reward-top{
    height:170px;
    background:#ECECF8;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.reward-emoji{
    font-size:78px;
    transition:.3s;
}

.reward-card.locked .reward-emoji{
    filter:grayscale(100%);
    opacity:.35;
}

.lock-icon{
    position:absolute;
    color:#fff;
    font-size:38px;
}

.reward-bottom{
    height:50px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:22px;
    font-weight:600;
    color:#777;
}

.reward-bottom i{
    color:#F4C542;
    font-size:18px;
}

.reward-name{
    text-align:center;
    font-size:13px;
    color:#666;
    padding-bottom:10px;
}

</style>
</head>
<body>

<!-- Header -->

<div class="header">

    <button class="back-btn" onclick="history.back()">
        <i class="bi bi-arrow-left"></i>
    </button>

    <div class="page-title">Rewards</div>

</div>

<!-- Balance -->

<div class="balance-card">

    <div class="coin">🪙</div>

    <div class="amount" id="coinBalance">0</div>

</div>

<!-- Rewards Grid -->

<div class="container">

    <div class="row g-3" id="rewardContainer"></div>

</div>

<script>

// Coins fetch from localStorage
const userCoins = parseInt(localStorage.getItem("MySalary")) || 35;

document.getElementById("coinBalance").innerText = userCoins;

// Rewards List

const rewards = [

    { emoji:'🎒', name:'Backpack', price:0 },

    { emoji:'🧢', name:'Cap', price:30 },

    { emoji:'👕', name:'T-Shirt', price:80 },

    { emoji:'⌚', name:'Watch', price:150 },

    { emoji:'👟', name:'Shoes', price:250 },

    { emoji:'🎧', name:'Headphones', price:350 },

    { emoji:'👗', name:'Dress', price:450 },

    { emoji:'🎮', name:'Game Controller', price:700 },

    { emoji:'💻', name:'Laptop', price:1000 },

    { emoji:'📱', name:'Smartphone', price:1500 }

];

const container = document.getElementById("rewardContainer");

rewards.forEach(item => {

    const unlocked = userCoins >= item.price;

    container.innerHTML += `
    
    <div class="col-6">

        <div class="reward-card ${unlocked ? 'unlocked' : 'locked'}">

            <div class="reward-top">

                <div class="reward-emoji">
                    ${item.emoji}
                </div>

                ${unlocked ? '' : '<i class="bi bi-lock-fill lock-icon"></i>'}

            </div>

            <div class="reward-bottom">

                <i class="bi bi-coin"></i>

                ${item.price}

            </div>

        </div>

    </div>

    `;

});

</script>

</body>
</html>
