<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rewards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/global.css?v=10.07.26">
<link rel="stylesheet" href="../css/reward.css?v=10.07.26">

</head>
<body>
    
<!-- HEADER -->
<header>
  <button class="back-btn" role="button" aria-label="Go back" onclick="window.history.back();">
    <i class="bi bi-arrow-left"></i>
  </button>
  <div class="title"> Rewards </div>
</header>

    
<!-- Balance -->

<div class="balance-card">

    <div class="coin">🪙</div>

    <div class="amount" id="coinBalance">0</div>

</div>

<!-- Rewards Grid -->

<div class="container">

    <div class="row g-3" id="rewardContainer"></div>

</div>

<script>

// Coins fetch from localStorage
const userCoins = parseInt(localStorage.getItem("MySalary")) || 0;

document.getElementById("coinBalance").innerText = userCoins;

// Rewards List

const rewards = [

    { emoji:'🎒', name:'Backpack', price:0 },

    { emoji:'🧢', name:'Cap', price:30 },

    { emoji:'👕', name:'T-Shirt', price:80 },

    { emoji:'⌚', name:'Watch', price:150 },

    { emoji:'👟', name:'Shoes', price:250 },

    { emoji:'🎧', name:'Headphones', price:350 },

    { emoji:'👗', name:'Dress', price:450 },

    { emoji:'🎮', name:'Game Controller', price:700 },

    { emoji:'💻', name:'Laptop', price:1000 },

    { emoji:'📱', name:'Smartphone', price:1500 }

];

const container = document.getElementById("rewardContainer");

rewards.forEach(item => {

    const unlocked = userCoins >= item.price;

    container.innerHTML += `
    
    <div class="col-6">

        <div class="reward-card ${unlocked ? 'unlocked' : 'locked'}">

            <div class="reward-top">

                <div class="reward-emoji">
                    ${item.emoji}
                </div>

                ${unlocked ? '' : '<i class="bi bi-lock-fill lock-icon"></i>'}

            </div>

            <div class="reward-bottom">

                <i class="bi bi-coin"></i>

                ${item.price}

            </div>

        </div>

    </div>

    `;

});

</script>

</body>
</html>
